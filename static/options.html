<!DOCTYPE html>
<html>

<head>
  <title>Job Search and Apply</title>
  <link rel="stylesheet" href="styles/options.css" />
</head>

<body>
  <div id="no-login" style="margin-top: 40vh">
    <h1 class="center-align">
      Please Login from the extension popup to continue
    </h1>
  </div>

  <main id="main-content" class="hidden">
    <section class="container">
      <h1>Hello Aldrin,</h1>
      <h3>25/50 Daily automations used</h3>
    </section>

    <!-- Filters Section -->
    <section class="container">
      <h2>Questions</h2>
      <ol>
        <li>
          <label for="notice">How many days of notice period do you need?:</label>
          <input type="number" id="notice" value="14" name="notice" placeholder="eg: 14" />
        </li>
        <li>
          <label for="ctc">What is your current salary?:</label>
          <input type="text" id="ctc" value="2" name="ctc" placeholder="eg: 10lpa" />
        </li>
        <li>
          <label for="ctc">What is your current CTC?:</label>
          <input type="text" id="ctc" value="2" name="ctc" placeholder="eg: 10lpa" />
        </li>
        <li>
          <label for="keyword">What is your expected CTC?:</label>
          <input type="text" id="workExp" value="2" name="workExp" placeholder="eg: 15lpa" />
        </li>
        <li>
          <label for="message">Your personal message to Hiring Manager</label>
          <textarea id="message" name="message" cols="20" rows="4" draggable="true"
            placeholder="I would be a good fit for this role!">
 I would be a good fit for this role!</textarea>
        </li>
      </ol>
    </section>

    <section class="container">
      <h2>Experience</h2>
      <div id="experienceContainer">
        <!-- <div>
                <label for="workExp">How many years of work experience do you have? :</label>
                <input type="number" id="workExp" value="2" name="workExp" placeholder="eg: 2" />
              </div> -->
        <li class="row">
          <div class="column" style="font-weight: bold">Skill</div>
          <div class="column" style="font-weight: bold">
            Experience in Years
          </div>
        </li>
        <li class="row">
          <div class="column">
            <input type="text" name="skill[]" value="javascript" />
          </div>
          <div class="column">
            <input type="number" name="experience[]" value="5" />
          </div>
          <div class="button" id="addButton">+</div>
          <div class="dummy" style="opacity: 0;">-</div>
        </li>
        <li class="row">
          <div class="column">
            <input type="text" name="skill[]" value="sql" />
          </div>
          <div class="column">
            <input type="number" name="experience[]" value="2" />
          </div>
          <div class="button" id="addButton">+</div>
          <div class="dummy" style="opacity: 0;">-</div>
        </li>
      </div>
    </section>

    <!-- Apply Button -->

    <section class="container">
      <label for="keyword">Job Keyword:</label>
      <input type="text" id="jobKeyword" value="Software Engineer" name="keyword"
        placeholder="eg: Software Developer" />
      <br />
      <br />
      <button id="fetchFiltersBtn">
        Fetch filters<span id="keywordPlaceholder"></span>
      </button>
    </section>

    <section class="container">
      <div id="filter-container"></div>
      <div>
        <br />
        <label for="maxJobs">How many jobs do you want to apply? </label>
        <input type="text" id="maxJobs" value="5" name="maxJobs" placeholder="eg: 20" />
      </div>

      <br />
      <button id="applyBtn">Apply for jobs</button>
    </section>
  </main>

  <script src="options.js"></script>
</body>

</html>
