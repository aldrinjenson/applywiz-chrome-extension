<!DOCTYPE html>
<html>

<head>
  <title>Job Search and Apply</title>
  <link rel="stylesheet" href="styles/options.css">
</head>

<body>

  <section class="container">
    <h1>Hello Aldrin, </h1>

    <h3>25/50 Daily automations used</h3>
    <br>
    <br>
    <label for="keyword">Job Keyword:</label>
    <input type="text" id="jobKeyword" value="Software Engineer" name="keyword" placeholder="eg: Software Developer">

    <br>
    <button id="fetchFiltersBtn">Fetch filters<span id="keywordPlaceholder"></span></button>

    <br>
    <br>
    <hr>
  </section>

  <!-- Filters Section -->
  <section class="container">
    <h2>Filters</h2>

    <!-- Job Locations Dropdown -->
    <label for="jobLocation">Job Locations:</label>
    <select id="jobLocation" name="jobLocation">
      <option value="remote">Remote</option>
      <option value="hybrid">Hybrid</option>
      <option value="in-office">In-Office</option>
    </select>

    <br>
    <!-- Experience Level Dropdown -->
    <label for="experienceLevel">Experience Level:</label>
    <select id="experienceLevel" name="experienceLevel">
      <option value="entry">Entry Level</option>
      <option value="mid">Mid Level</option>
      <option value="senior">Senior Level</option>
    </select>
    <br>
    <br>

    <!-- Salary Range Slider -->
    <label for="salaryRange">Salary Level:</label>
    <input type="range" id="salaryRange" name="salaryRange" min="0" max="100" step="1">

    <br>
    <br>
    <hr>
    <br>

    <br>


    <h2>Questions</h2>

    <ol>
      <li>
        <label for="workExp">How many years of work experience do you have? :</label>
        <input type="number" id="workExp" value="2" name="workExp" placeholder="eg: 2">
      </li>
      <li>
        <label for="notice">How many days of notice period do you need?:</label>
        <input type="number" id="notice" value="14" name="notice" placeholder="eg: 14">
      </li>
      <li>
        <label for="ctc">What is your current CTC?:</label>
        <input type="text" id="workExp" value="2" name="ctc" placeholder="eg: 10lpa">
      </li>
      <li>
        <label for="keyword">What is your expected CTC?:</label>
        <input type="text" id="workExp" value="2" name="workExp" placeholder="eg: 15lpa">
      </li>

    </ol>

    <!-- Apply Button -->
    <button id="applyBtn">Apply for jobs</button>


    <div id="filter-container">

    </div>

  </section>
  <script src="options.js"></script>
</body>

</html>
