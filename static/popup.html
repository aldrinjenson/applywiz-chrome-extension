<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles/popup.css" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500&display=swap" rel="stylesheet" />
</head>

<body class="container">

  <div>
    <img src="icons/logo_only.png" alt="logo" height="80px" width="60px" />
  </div>

  <form id="loginForm">
    <br />
    <h2 style="margin: auto; color: black;">Login</h2>
    <br />
    <div class="input-field">
      <input type="email" value="" id="emailInput" name="email" placeholder="Email" />
      <div class="underline"></div>
    </div>
    <br>
    <div class="input-field">
      <input type="password" id="passwordInput" value="" name="password" placeholder="password" />
      <div class="underline"></div>
    </div>

    <input type="submit" value="Login" />
    <br />
    <p id="signup" style="color:#0094a8; margin-left: 1rem ;">
      Don't have account yet? <a href="https://apply-wiz.com/signup">Sign Up</a>
    </p>
    >
  </form>


  <div style="text-align: center;" class="protected hidden" id="stats">
    <button id="go-to-options" class="button2" style="margin-top: 2rem">
      Visit Dashboard
    </button>
    <br>
    <br><br>
    <p style="color: black;">
      Visit <a href="https://apply-wiz.com/report">apply-wiz.com</a> for daily report.
    </p>

    <div id="in-progress-wrapper">
      <p style="color: black;margin-top: 1rem;">Automation in Progress</p>
      <!-- <button id="stop-automation-btn" class="btn-outline">Stop Automation</button> -->
    </div>

    <button id="signOutBtn" style="margin-top: 15px;" class="button underline">Sign Out</button>
  </div>
  <script src="popup.js"></script>
</body>

</html>
